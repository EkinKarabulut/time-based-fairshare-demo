# Simulator config: WITHOUT time-based fairshare
# KValue 0 means historical usage has no effect on fairshare
# Result: the team that gets scheduled first monopolizes resources

Cycles: 2048
WindowSize: 512
HalfLifePeriod: 0
KValue: 0.0

Nodes:
  - GPUs: 100
    Count: 1

Queues:
  - Name: ai-department
    Parent: ""
    Priority: 100
    DeservedGPUs: 0.0
    Weight: 1.0
  - Name: llm-team
    Parent: ai-department
    Priority: 100
    DeservedGPUs: 30.0
    Weight: 1.0
  - Name: vision-team
    Parent: ai-department
    Priority: 100
    DeservedGPUs: 20.0
    Weight: 1.0

Jobs:
  llm-team:
    GPUs: 60
    NumPods: 1
    NumJobs: 100
  vision-team:
    GPUs: 2
    NumPods: 1
    NumJobs: 500
