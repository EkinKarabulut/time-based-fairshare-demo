apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasource-kai-prom
  namespace: monitoring
  labels:
    grafana_datasource: "1"
data:
  kai-prometheus.yaml: |
    apiVersion: 1
    datasources:
    - name: kai-prometheus
      type: prometheus
      access: proxy
      url: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
      isDefault: false
      editable: true
      jsonData:
        httpMethod: POST
        timeInterval: 15s
